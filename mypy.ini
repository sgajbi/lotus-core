[mypy]
python_version = 3.12
mypy_path = src/libs/portfolio-common
files =
    src/services/query_service/app/dtos,
    src/services/query_service/app/routers,
    src/services/query_control_plane_service/app/application/analytics,
    src/services/query_control_plane_service/app/domain/analytics.py,
    src/services/query_control_plane_service/app/ports/analytics.py,
    src/services/query_control_plane_service/app/infrastructure/analytics_export_repository.py,
    src/services/query_control_plane_service/app/infrastructure/analytics_timeseries_repository.py,
    src/services/query_control_plane_service/app/infrastructure/analytics_unit_of_work.py
ignore_missing_imports = True
follow_imports = skip
warn_return_any = True
warn_unused_configs = True

[mypy-portfolio_common.utils]
follow_imports = normal
