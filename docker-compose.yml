# App-local / isolated-dev stack for lotus-core.
# Canonical shared infrastructure ownership lives in lotus-platform/platform-stack.
name: lotus-core-app-local

x-lotus-stack-contract:
  stack_classification: app-local
  canonical_shared_infra: false
  canonical_owner: lotus-core
  canonical_shared_infra_owner: lotus-platform/platform-stack
  purpose:
    - isolated-development
    - service-local-debugging
    - app-local-observability

x-shared-python-env: &shared_python_env
  PYTHONPATH: /app/src/libs/portfolio-common

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    ports:
      - "${LOTUS_ZOOKEEPER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,stat,mntr,conf"
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,mntr,conf"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    ports:
      - "${LOTUS_KAFKA_EXTERNAL_PORT:-9092}:9092"
      - "${LOTUS_KAFKA_INTERNAL_PORT:-9093}:9093"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:${LOTUS_KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9093 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network

  kafka-topic-creator:
    build:
      context: .
      dockerfile: ./src/services/persistence_service/Dockerfile
    image: lotus-core/kafka-topic-creator:local
    hostname: kafka-topic-creator
    depends_on:
       kafka:
        condition: service_healthy
    command: ["python", "-m", "tools.kafka_setup"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
    networks:
      - app_network

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    ports:
      - "${LOTUS_POSTGRES_HOST_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  migration-runner:
    build:
      context: .
      dockerfile: ./src/services/persistence_service/Dockerfile
    image: lotus-core/migration-runner:local
    hostname: migration-runner
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/portfolio_db}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: 'no'
    networks:
      - app_network

  ingestion_service:
    build:
      context: .
      dockerfile: ./src/services/ingestion_service/Dockerfile
    image: lotus-core/ingestion-service:local
    hostname: ingestion_service
    ports:
      - "${LOTUS_INGESTION_HOST_PORT:-8200}:8000"
    environment:
      <<: *shared_python_env
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      LOTUS_CORE_INGEST_RATE_LIMIT_WINDOW_SECONDS: ${LOTUS_CORE_INGEST_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOTUS_CORE_INGEST_RATE_LIMIT_MAX_REQUESTS: ${LOTUS_CORE_INGEST_RATE_LIMIT_MAX_REQUESTS:-500}
      LOTUS_CORE_INGEST_RATE_LIMIT_MAX_RECORDS: ${LOTUS_CORE_INGEST_RATE_LIMIT_MAX_RECORDS:-50000}
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topic-creator:
        condition: service_completed_successfully
    volumes:
      - ./src/services/ingestion_service/app:/app/app
      - ./src/libs/portfolio-common:/app/src/libs/portfolio-common
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 30 --no-access-log
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  query_service:
    build:
      context: .
      dockerfile: ./src/services/query_service/Dockerfile
    image: lotus-core/query-service:local
    hostname: query_service
    ports:
      - "${LOTUS_QUERY_HOST_PORT:-8201}:8001"
    environment:
      <<: *shared_python_env
      DATABASE_URL: ${QUERY_DATABASE_URL:-postgresql://user:password@postgres:5432/portfolio_db}
    depends_on:
      migration-runner:
        condition: service_completed_successfully
    volumes:
      - ./src/services/query_service/app:/app/app
      - ./src/libs/portfolio-common:/app/src/libs/portfolio-common
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --no-access-log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
