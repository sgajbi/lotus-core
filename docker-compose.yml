      VALUATION_SCHEDULER_POLL_INTERVAL: ${VALUATION_SCHEDULER_POLL_INTERVAL:-2}
      VALUATION_SCHEDULER_BATCH_SIZE: ${VALUATION_SCHEDULER_BATCH_SIZE:-1000}
      VALUATION_SCHEDULER_DISPATCH_ROUNDS: ${VALUATION_SCHEDULER_DISPATCH_ROUNDS:-10}
