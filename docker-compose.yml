  demo_data_loader:
    build:
      context: .
      dockerfile: ./src/services/persistence_service/Dockerfile
    image: lotus-core/demo-data-loader:local
    hostname: demo_data_loader
    environment:
      DEMO_DATA_PACK_ENABLED: ${DEMO_DATA_PACK_ENABLED:-true}
    depends_on:
      ingestion_service:
        condition: service_healthy
      query_service:
        condition: service_healthy
      query_control_plane_service:
        condition: service_healthy
      persistence_service:
        condition: service_healthy
      position_calculator_service:
        condition: service_healthy
      valuation_orchestrator_service:
        condition: service_healthy
      position_valuation_calculator:
        condition: service_healthy
      timeseries_generator_service:
        condition: service_healthy
      portfolio_aggregation_service:
        condition: service_healthy
    command: >
      sh -c "
      if [ \"$$DEMO_DATA_PACK_ENABLED\" = \"false\" ]; then
        echo 'Demo data pack disabled via DEMO_DATA_PACK_ENABLED=false';
        exit 0;
      fi;
      python -m tools.demo_data_pack
      --ingestion-base-url http://ingestion_service:8000
      --query-base-url http://query_service:8001
      --query-control-plane-base-url http://query_control_plane_service:8002
      --force-ingest
      --wait-seconds 420
      --poll-interval-seconds 3
      "
    restart: "no"
    networks:
      - app_network

  # App-local observability overlay for isolated lotus-core development.
  # Canonical shared Prometheus ownership lives in lotus-platform/platform-stack.
  prometheus:
    image: prom/prometheus:v2.47.2
    ports:
      - "${LOTUS_PROMETHEUS_HOST_PORT:-9190}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - app_network
    depends_on:
      - ingestion_service
      - query_service
      - query_control_plane_service
      - event_replay_service
      - persistence_service
      - cost_calculator_service
      - cashflow_calculator_service
      - position_calculator_service
      - pipeline_orchestrator_service
      - valuation_orchestrator_service
      - position_valuation_calculator
      - timeseries_generator_service
      - portfolio_aggregation_service

  # App-local Grafana overlay for isolated lotus-core development.
  # Canonical shared Grafana provisioning lives in lotus-platform/platform-stack.
  grafana:
    image: grafana/grafana:10.1.5
    ports:
      - "${LOTUS_GRAFANA_HOST_PORT:-3300}:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    networks:
      - app_network
    depends_on:
      - prometheus

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge

