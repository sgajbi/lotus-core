# App-local Grafana dashboard provisioning overlay for isolated lotus-core development.
# Canonical shared Grafana provisioning lives in lotus-platform/platform-stack.
apiVersion: 1
providers:
  - name: 'default-dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
