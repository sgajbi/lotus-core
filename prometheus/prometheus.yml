# App-local Prometheus scrape config for the isolated lotus-core stack.
# Canonical shared Prometheus ownership lives in:
#   lotus-platform/platform-stack/prometheus/prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'ingestion_service'
    static_configs:
      - targets: ['ingestion_service:8000']
  - job_name: 'query_service'
    static_configs:
      - targets: ['query_service:8001']
  - job_name: 'query_control_plane_service'
    static_configs:
      - targets: ['query_control_plane_service:8002']
  - job_name: 'event_replay_service'
    static_configs:
      - targets: ['event_replay_service:8009']
  - job_name: 'financial_reconciliation_service'
    static_configs:
      - targets: ['financial_reconciliation_service:8010']
  - job_name: 'persistence_service'
    static_configs:
      - targets: ['persistence_service:8080']
  - job_name: 'portfolio_transaction_processing_service'
    static_configs:
      - targets: ['portfolio_transaction_processing_service:8085']
  - job_name: 'valuation_orchestrator_service'
    static_configs:
      - targets: ['valuation_orchestrator_service:8087']
  - job_name: 'position_valuation_calculator'
    static_configs:
      - targets: ['position_valuation_calculator:8084']
  - job_name: 'portfolio_derived_state_service'
    static_configs:
      - targets: ['portfolio_derived_state_service:8085']
