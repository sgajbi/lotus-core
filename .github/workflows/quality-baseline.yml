name: Quality Baseline Report

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  NODE_VERSION: "22"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"

jobs:
  ruff-regression-gate:
    name: Quality Baseline / Ruff Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Ruff
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Ruff regression gate
        run: make quality-ruff-gate

  ruff-format-gate:
    name: Quality Baseline / Ruff Format Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Ruff
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Ruff format gate
        run: make quality-ruff-format-gate

  import-boundary-gate:
    name: Quality Baseline / Import Boundary Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install import-linter
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Import boundary gate
        run: make quality-import-boundary-gate

  api-governance-gate:
    name: Quality Baseline / API Governance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tools/api_governance/package-lock.json
      - name: Install repository
        run: |
          python -m pip install -U pip
          python scripts/development/bootstrap_dev.py
      - name: OpenAPI quality gate
        run: python scripts/quality/openapi_quality_gate.py
      - name: API vocabulary gate
        run: python scripts/quality/api_vocabulary_inventory.py --validate-only
      - name: OpenAPI Spectral gate
        run: make quality-openapi-spectral-gate

  typecheck-gate:
    name: Quality Baseline / Typecheck Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install mypy
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Typecheck gate
        run: make typecheck

  bandit-security-gate:
    name: Quality Baseline / Bandit Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Bandit
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Bandit security gate
        run: make quality-bandit-gate

  vulture-source-gate:
    name: Quality Baseline / Vulture Source Dead-Code Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Vulture
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Vulture source dead-code gate
        run: make quality-vulture-source-gate

  deptry-source-gate:
    name: Quality Baseline / Deptry Source Dependency Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install deptry
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Deptry source dependency gate
        run: make quality-deptry-source-gate

  maintainability-gate:
    name: Quality Baseline / Maintainability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Radon
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Maintainability gate
        run: make quality-maintainability-gate

  complexity-gate:
    name: Quality Baseline / Complexity Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Xenon
        run: python -m pip install -r requirements/ci-tooling.lock.txt
      - name: Complexity gate
        run: make quality-complexity-gate

  unit-collection-gate:
    name: Quality Baseline / Unit Collection Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository
        run: |
          python -m pip install -U pip
          python scripts/development/bootstrap_dev.py
      - name: Unit collection gate
        run: make quality-unit-collection-gate

  integration-lite-collection-gate:
    name: Quality Baseline / Integration Lite Collection Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository
        run: |
          python -m pip install -U pip
          python scripts/development/bootstrap_dev.py
      - name: Integration lite collection gate
        run: make quality-integration-lite-collection-gate

  workflow-governance-gate:
    name: Quality Baseline / Workflow Governance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository
        run: make install-ci
      - name: Workflow governance gate
        run: make quality-workflow-governance-gate

  wiki-docs-gate:
    name: Quality Baseline / Wiki Docs Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Wiki docs gate
        run: make quality-wiki-docs-gate

  report-only:
    name: Quality Baseline / Report Only
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository and report tools
        run: |
          python -m pip install -U pip
          python scripts/development/bootstrap_dev.py
      - name: Ruff baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run ruff check . --statistics
      - name: Test collection baseline
        continue-on-error: true
        run: python -m pytest --collect-only -q
      - name: Typecheck baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run mypy --config-file mypy.ini
      - name: Complexity baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run radon cc src -s -a
      - name: Maintainability baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run radon mi src -s
      - name: Dead-code baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run vulture src tests --min-confidence 80
      - name: Dependency baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run deptry src --extend-exclude "src/services/query_service/build" --extend-exclude ".*/tests/"
      - name: Security baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run bandit -r src -c pyproject.toml
      - name: Dependency audit baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run pip-audit
      - name: Import boundary baseline
        continue-on-error: true
        run: make quality-import-boundary-gate
      - name: Docstring baseline
        continue-on-error: true
        run: python scripts/quality/ci_tooling.py run interrogate src
