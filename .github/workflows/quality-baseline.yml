name: Quality Baseline Report

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  NODE_VERSION: "22"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"

jobs:
  ruff-regression-gate:
    name: Quality Baseline / Ruff Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff regression gate
        run: python -m ruff check . --statistics

  ruff-format-gate:
    name: Quality Baseline / Ruff Format Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff format gate
        run: python -m ruff format --check .

  import-boundary-gate:
    name: Quality Baseline / Import Boundary Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install import-linter
        run: python -m pip install import-linter
      - name: Import boundary gate
        run: python scripts/import_boundary_gate.py

  api-governance-gate:
    name: Quality Baseline / API Governance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install repository
        run: |
          python -m pip install -U pip
          python scripts/bootstrap_dev.py
      - name: OpenAPI quality gate
        run: python scripts/openapi_quality_gate.py
      - name: API vocabulary gate
        run: python scripts/api_vocabulary_inventory.py --validate-only
      - name: OpenAPI Spectral gate
        run: make quality-openapi-spectral-gate

  typecheck-gate:
    name: Quality Baseline / Typecheck Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install mypy
        run: python -m pip install mypy
      - name: Typecheck gate
        run: python -m mypy --config-file mypy.ini

  bandit-security-gate:
    name: Quality Baseline / Bandit Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Bandit
        run: python -m pip install bandit
      - name: Bandit security gate
        run: python -m bandit -r src -c pyproject.toml

  vulture-source-gate:
    name: Quality Baseline / Vulture Source Dead-Code Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Vulture
        run: python -m pip install vulture
      - name: Vulture source dead-code gate
        run: python -m vulture src --exclude "*/tests/*" --min-confidence 80

  deptry-source-gate:
    name: Quality Baseline / Deptry Source Dependency Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install deptry
        run: python -m pip install deptry
      - name: Deptry source dependency gate
        run: python -m deptry src --extend-exclude "src/services/query_service/build" --extend-exclude ".*/tests/"

  maintainability-gate:
    name: Quality Baseline / Maintainability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Radon
        run: python -m pip install radon
      - name: Maintainability gate
        run: python scripts/maintainability_gate.py src

  complexity-gate:
    name: Quality Baseline / Complexity Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install Xenon
        run: python -m pip install xenon
      - name: Complexity gate
        run: python -m xenon --max-absolute E --max-modules C --max-average A src

  unit-collection-gate:
    name: Quality Baseline / Unit Collection Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository
        run: |
          python -m pip install -U pip
          python scripts/bootstrap_dev.py
      - name: Unit collection gate
        run: make quality-unit-collection-gate

  integration-lite-collection-gate:
    name: Quality Baseline / Integration Lite Collection Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository
        run: |
          python -m pip install -U pip
          python scripts/bootstrap_dev.py
      - name: Integration lite collection gate
        run: make quality-integration-lite-collection-gate

  workflow-governance-gate:
    name: Quality Baseline / Workflow Governance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository
        run: make install-ci
      - name: Workflow governance gate
        run: make quality-workflow-governance-gate

  wiki-docs-gate:
    name: Quality Baseline / Wiki Docs Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Wiki docs gate
        run: make quality-wiki-docs-gate

  report-only:
    name: Quality Baseline / Report Only
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install repository and report tools
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install ruff pytest pytest-cov coverage radon xenon vulture deptry bandit pip-audit import-linter interrogate mypy
      - name: Ruff baseline
        continue-on-error: true
        run: python -m ruff check . --statistics
      - name: Test collection baseline
        continue-on-error: true
        run: python -m pytest --collect-only -q
      - name: Typecheck baseline
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini
      - name: Complexity baseline
        continue-on-error: true
        run: python -m radon cc src -s -a
      - name: Maintainability baseline
        continue-on-error: true
        run: python -m radon mi src -s
      - name: Dead-code baseline
        continue-on-error: true
        run: python -m vulture src tests --min-confidence 80
      - name: Dependency baseline
        continue-on-error: true
        run: python -m deptry src --extend-exclude "src/services/query_service/build" --extend-exclude ".*/tests/"
      - name: Security baseline
        continue-on-error: true
        run: python -m bandit -r src -c pyproject.toml
      - name: Dependency audit baseline
        continue-on-error: true
        run: python -m pip_audit
      - name: Import boundary baseline
        continue-on-error: true
        run: python scripts/import_boundary_gate.py
      - name: Docstring baseline
        continue-on-error: true
        run: interrogate src
