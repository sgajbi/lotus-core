name: Lotus Core Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  merge_group:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  # Collapse only push-to-main runs into one queue so newer merges cancel older in-flight main runs.
  # Keep PR/merge_group/scheduled/manual runs independent to avoid cross-canceling validation work.
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'main' || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lint GitHub Actions Workflows
        uses: reviewdog/action-actionlint@v1

  quality:
    name: Lint, Typecheck, Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Security Audit
        run: make security-audit

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: OpenAPI Gate
        run: make openapi-gate

      - name: API Vocabulary Gate
        run: make api-vocabulary-gate

      - name: Migration Contract Smoke
        run: make migration-smoke

      - name: Unit Warning Gate
        run: make warning-gate

  test-suites:
    name: Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
          - suite: unit-db
          - suite: integration-lite
          - suite: ops-contract
          - suite: transaction-buy-contract
          - suite: transaction-sell-contract
          - suite: transaction-dividend-contract
          - suite: transaction-interest-contract
          - suite: transaction-fx-contract
          - suite: transaction-portfolio-flow-bundle-contract
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Run ${{ matrix.suite }} tests with coverage data
        run: |
          python scripts/test_manifest.py --suite ${{ matrix.suite }} --with-coverage --coverage-file .coverage.${{ matrix.suite }}

      - name: Upload coverage data (${{ matrix.suite }})
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.suite }}
          path: .coverage.${{ matrix.suite }}
          include-hidden-files: true
          if-no-files-found: error

  integration-all:
    name: Integration Full
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Run full integration suite
        run: make test-integration-all

      - name: Capture docker compose logs on failure
        if: failure()
        run: docker compose logs > integration-all-logs.txt

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-all-artifacts
          path: integration-all-logs.txt
          if-no-files-found: warn
          retention-days: 14

  coverage-gate:
    name: Coverage Gate (Combined)
    needs: [test-suites]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          merge-multiple: true
          path: coverage-data

      - name: Enforce combined coverage threshold
        run: |
          python -m coverage combine coverage-data
          python -m coverage report --fail-under=99

  docker-build:
    name: Validate Docker Build
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: .buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', 'requirements/shared-runtime.lock.txt', 'src/**/Dockerfile', 'src/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Prebuild query-service image with cache
        run: python3 scripts/prebuild_ci_images.py --cache-dir .buildx-cache --services query_service

      - name: Generate runtime SBOM
        run: |
          mkdir -p output/build-evidence
          python -m pip_audit -r requirements/shared-runtime.lock.txt --format cyclonedx-json -o output/build-evidence/shared-runtime-sbom.cdx.json

      - name: Write build provenance manifest
        run: |
          python scripts/write_build_provenance.py --dockerfile src/services/query_service/Dockerfile --image-tag lotus-core/query-service:local --output output/build-evidence/query-service-provenance.json

      - name: Upload build evidence
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-evidence
          path: output/build-evidence/*
          if-no-files-found: error
          retention-days: 14

  docker-smoke-contract:
    name: Docker Smoke Contract
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: .buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', 'requirements/shared-runtime.lock.txt', 'src/**/Dockerfile', 'src/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: .buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', 'requirements/shared-runtime.lock.txt', 'src/**/Dockerfile', 'src/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Prebuild compose images with cache
        run: python scripts/prebuild_ci_images.py --cache-dir .buildx-cache

      - name: Run deterministic docker endpoint smoke
        run: python scripts/docker_endpoint_smoke.py

      - name: Capture docker compose logs on failure
        if: failure()
        run: docker compose logs > docker-smoke-logs.txt

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-artifacts
          path: |
            output/task-runs/*.json
            output/task-runs/*.md
            docker-smoke-logs.txt
          if-no-files-found: warn
          retention-days: 14

  latency-gate:
    name: Latency Gate
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: .buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', 'requirements/shared-runtime.lock.txt', 'src/**/Dockerfile', 'src/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Prebuild compose images with cache
        run: python scripts/prebuild_ci_images.py --cache-dir .buildx-cache

      - name: Run endpoint latency gate
        run: python scripts/latency_profile.py --enforce

      - name: Capture docker compose logs on failure
        if: failure()
        run: docker compose logs > latency-gate-logs.txt

      - name: Upload latency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latency-gate-artifacts
          path: |
            output/task-runs/*latency-profile*.json
            output/task-runs/*latency-profile*.md
            latency-gate-logs.txt
          if-no-files-found: warn
          retention-days: 14

  performance-load-gate:
    name: Performance Load Gate (Fast)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'pull_request'
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: .buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', 'requirements/shared-runtime.lock.txt', 'src/**/Dockerfile', 'src/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Prebuild compose images with cache
        run: python scripts/prebuild_ci_images.py --cache-dir .buildx-cache

      - name: Run deterministic performance load gate
        run: python scripts/performance_load_gate.py --profile-tier fast --enforce

      - name: Capture docker compose logs on failure
        if: failure()
        run: docker compose logs > performance-load-gate-logs.txt

      - name: Upload performance load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-load-gate-artifacts
          path: |
            output/task-runs/*performance-load-gate*.json
            output/task-runs/*performance-load-gate*.md
            performance-load-gate-logs.txt
          if-no-files-found: warn
          retention-days: 14

  performance-load-gate-full:
    name: Performance Load Gate (Full)
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: .buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', 'requirements/shared-runtime.lock.txt', 'src/**/Dockerfile', 'src/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Prebuild compose images with cache
        run: python scripts/prebuild_ci_images.py --cache-dir .buildx-cache

      - name: Run deterministic full performance load gate
        run: python scripts/performance_load_gate.py --profile-tier full --enforce

      - name: Capture docker compose logs on failure
        if: failure()
        run: docker compose logs > performance-load-gate-full-logs.txt

      - name: Upload full performance load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-load-gate-full-artifacts
          path: |
            output/task-runs/*performance-load-gate*.json
            output/task-runs/*performance-load-gate*.md
            performance-load-gate-full-logs.txt
          if-no-files-found: warn
          retention-days: 14

  e2e-all:
    name: E2E Full
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [quality, coverage-gate, integration-all, performance-load-gate-full]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: .buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker-compose.yml', 'requirements/shared-runtime.lock.txt', 'src/**/Dockerfile', 'src/**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Run full E2E suite
        env:
          LOTUS_TEST_ENV_PROFILE: e2e
          E2E_INGESTION_URL: http://localhost:8400
          E2E_QUERY_URL: http://localhost:8401
          HOST_DATABASE_URL: postgresql://user:password@localhost:57432/portfolio_db
        run: make test-e2e-all

      - name: Capture docker compose logs on failure
        if: failure()
        run: docker compose logs > e2e-docker-logs.txt

      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: e2e-docker-logs.txt

  failure-recovery-gate:
    name: Failure Recovery Gate
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [quality, performance-load-gate-full]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Prebuild compose images with cache
        run: python scripts/prebuild_ci_images.py --cache-dir .buildx-cache

      - name: Run deterministic failure recovery gate
        run: python scripts/failure_recovery_gate.py --enforce

      - name: Capture docker compose logs on failure
        if: failure()
        run: docker compose logs > failure-recovery-gate-logs.txt

      - name: Upload failure recovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-recovery-gate-artifacts
          path: |
            output/task-runs/*failure-recovery-gate*.json
            output/task-runs/*failure-recovery-gate*.md
            failure-recovery-gate-logs.txt
          if-no-files-found: warn
          retention-days: 14

  institutional-signoff-pack:
    name: Institutional Sign-Off Pack
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs:
      [docker-smoke-contract, latency-gate, performance-load-gate, failure-recovery-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tooling and Project Dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Download sign-off artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-artifacts"
          merge-multiple: true
          path: output/task-runs

      - name: Generate institutional sign-off pack (required gate)
        run: make test-institutional-signoff-pack

      - name: Upload institutional sign-off artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: institutional-signoff-pack-artifacts
          path: |
            output/task-runs/*-institutional-signoff-pack.json
            output/task-runs/*-institutional-signoff-pack.md
          if-no-files-found: error
          retention-days: 30
