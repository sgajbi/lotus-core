name: PR Auto Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  queue-auto-merge:
    name: Queue Auto Merge
    if: >
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.fork == false
    concurrency:
      group: pr-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Enable auto-merge queue (rebase)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HAS_AUTOMERGE_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'automerge') }}
        run: |
          if [ "$HAS_AUTOMERGE_LABEL" != "true" ]; then
            echo "Skipping auto-merge queue because the automerge label is absent."
            exit 0
          fi
          set +e
          output=$(gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --rebase --delete-branch 2>&1)
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "$output"
            exit 0
          fi
          if echo "$output" | grep -qi "already"; then
            echo "$output"
            exit 0
          fi
          echo "$output"
          exit "$code"
