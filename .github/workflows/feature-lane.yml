name: Remote Feature Lane

on:
  push:
    branches-ignore:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PYTHON_VERSION: "3.12"

jobs:
  workflow-lint:
    name: Feature Lane / Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-actionlint@v1

  lint-typecheck-contracts-security:
    name: Feature Lane / Lint Typecheck Contracts Security
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Resolve dependency health cache key
        id: dependency-health-cache-key
        run: |
          key="$(python scripts/validation/dependency_health_check.py --print-cache-key)"
          [[ "$key" =~ ^[0-9a-f]{64}$ ]]
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - name: Restore dependency health cache
        id: dependency-health-cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/dependency-health
          key: dependency-health-${{ runner.os }}-${{ steps.dependency-health-cache-key.outputs.key }}
      - name: Verify Dependencies
        run: make verify-dependencies
      - name: Save verified dependency health cache
        if: steps.dependency-health-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .cache/dependency-health
          key: dependency-health-${{ runner.os }}-${{ steps.dependency-health-cache-key.outputs.key }}
      - name: Lint
        run: make lint
      - name: No-Alias Contract Guard
        run: make no-alias-gate
      - name: Typecheck
        run: make typecheck
      - name: Architecture Guard
        run: make architecture-guard
      - name: OpenAPI Gate
        run: make openapi-gate
      - name: API Vocabulary Gate
        run: make api-vocabulary-gate
      - name: Migration Contract Smoke
        run: make migration-smoke
      - name: Security Audit
        run: make security-audit
      - name: Upload dependency health evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: feature-lane-dependency-health-${{ github.run_id }}
          path: output/dependency-health/*.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Warning Gate
        run: make warning-gate

  test-suites:
    name: Feature Lane / Tests (${{ matrix.suite }})
    needs: [lint-typecheck-contracts-security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit-db
            target: test-unit-db
          - suite: integration-lite
            target: test-integration-lite
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install
        run: make install-ci
      - name: Run ${{ matrix.suite }}
        run: make ${{ matrix.target }}
